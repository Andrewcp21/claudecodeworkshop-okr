<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Workshop — Pre-Survey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --card: rgba(255,255,255,0.04);
            --card-hover: rgba(255,255,255,0.07);
            --card-selected: rgba(254,222,62,0.08);
            --border: rgba(255,255,255,0.08);
            --border-selected: #fede3e;
            --accent: #fede3e;
            --accent-light: #ffe566;
            --accent-glow: rgba(254,222,62,0.25);
            --text: #f2f0f0;
            --text-dim: rgba(242,240,240,0.5);
            --text-faint: rgba(242,240,240,0.22);
        }

        html, body { height: 100%; overflow: hidden; }
        @media (max-width: 640px) { html, body { overflow: auto; } }
        body { background: var(--bg); color: var(--text); font-family: 'Red Hat Display', sans-serif; }

        /* ── Background ── */
        .bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        .bg::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 55% 50% at 5% 95%, rgba(254,222,62,0.07) 0%, transparent 55%),
                radial-gradient(ellipse 45% 35% at 92% 8%, rgba(254,222,62,0.04) 0%, transparent 50%);
            animation: bgDrift 12s ease-in-out infinite alternate;
        }
        @keyframes bgDrift {
            from { opacity: 0.8; transform: scale(1); }
            to   { opacity: 1;   transform: scale(1.04) translateY(-8px); }
        }
        .bg::after {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── App shell ── */
        .app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

        /* ── Top bar ── */
        .top-bar {
            padding: 22px 36px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-mark {
            width: 36px; height: 36px; border-radius: 50%;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 4px 18px rgba(254,222,62,0.28);
        }
        .logo-mark img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        .logo-text {
            font-size: 11px; font-weight: 600;
            color: var(--text-dim); letter-spacing: 0.07em; text-transform: uppercase;
        }

        /* ── Dot-step progress ── */
        .progress-wrap {
            padding: 0 36px 4px; flex-shrink: 0;
        }
        .dot-steps {
            display: flex; align-items: center; gap: 8px;
        }
        .dot-step {
            position: relative; height: 4px; border-radius: 4px;
            background: rgba(255,255,255,0.08);
            flex: 1;
            cursor: pointer;
            transition: background 0.35s ease;
            overflow: hidden;
        }
        .dot-step::after {
            content: '';
            position: absolute; inset: 0; left: 0;
            background: var(--accent);
            border-radius: 4px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
        }
        .dot-step.done::after  { transform: scaleX(1); }
        .dot-step.active::after { transform: scaleX(0.5); background: var(--accent); opacity: 0.6; }
        .dot-step.done { background: rgba(254,222,62,0.15); }

        /* ── Counter ── */
        .question-counter {
            font-size: 12px; font-weight: 600;
            color: var(--text-faint); letter-spacing: 0.06em;
        }
        .question-counter .current { color: var(--accent); }

        /* ── Content area ── */
        .content-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 24px 36px 36px; overflow: hidden; position: relative;
        }

        /* ── Question panel ── */
        .question-panel {
            position: absolute; width: 100%; max-width: 700px;
            display: flex; flex-direction: column; gap: 20px;
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease;
        }
        .question-panel.active   { transform: translateX(0); opacity: 1; }
        .question-panel.exit-left  { transform: translateX(-72px); opacity: 0; pointer-events: none; }
        .question-panel.exit-right { transform: translateX(72px);  opacity: 0; pointer-events: none; }
        .question-panel.enter-right { transform: translateX(72px);  opacity: 0; pointer-events: none; }
        .question-panel.enter-left  { transform: translateX(-72px); opacity: 0; pointer-events: none; }

        /* Stagger children */
        .question-panel.active .q-tag    { animation: fadeUp 0.45s ease both 0.04s; }
        .question-panel.active .q-title  { animation: fadeUp 0.45s ease both 0.09s; }
        .question-panel.active .q-sub    { animation: fadeUp 0.45s ease both 0.12s; }
        .question-panel.active .q-body   { animation: fadeUp 0.45s ease both 0.16s; }
        .question-panel.active .q-nav    { animation: fadeUp 0.45s ease both 0.21s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Watermark number ── */
        .q-watermark {
            position: absolute;
            top: -20px; right: -10px;
            font-size: clamp(120px, 18vw, 200px);
            font-weight: 900;
            color: var(--text);
            opacity: 0.032;
            letter-spacing: -0.06em;
            line-height: 1;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.4s;
            overflow: hidden;
        }
        /* Welcome screen: emoji watermark gets slightly different treatment */
        .q-watermark.is-emoji {
            opacity: 0.07;
            font-size: clamp(90px, 14vw, 150px);
            top: -10px;
        }

        .q-tag {
            font-size: 11px; font-weight: 700;
            color: var(--accent); letter-spacing: 0.13em; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
        }
        .q-tag::before {
            content: '';
            display: inline-block; width: 14px; height: 2px;
            background: var(--accent); border-radius: 2px;
        }
        .q-title {
            font-size: clamp(22px, 3.2vw, 30px); font-weight: 800;
            line-height: 1.2; letter-spacing: -0.02em;
        }
        .q-sub {
            font-size: 14px; color: var(--text-dim); font-weight: 400; margin-top: -8px;
        }

        /* ── Option cards ── */
        .options-grid { display: grid; gap: 9px; }
        .options-grid.two-col { grid-template-columns: 1fr 1fr; }

        .option-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 18px;
            cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s;
            position: relative; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        .option-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(120deg, rgba(254,222,62,0.05), transparent 70%);
            opacity: 0; transition: opacity 0.18s;
        }
        .option-card:hover {
            background: var(--card-hover);
            border-color: rgba(254,222,62,0.2);
            transform: translateY(-1px);
        }
        .option-card:hover::before { opacity: 1; }

        .option-card.selected {
            background: var(--card-selected);
            border-color: var(--border-selected);
            box-shadow: 0 0 0 1px rgba(254,222,62,0.12), 0 4px 20px rgba(254,222,62,0.08);
            animation: cardPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .option-card.selected::before { opacity: 1; }

        /* Card pop bounce on selection */
        @keyframes cardPop {
            0%   { transform: scale(1); }
            45%  { transform: scale(1.025); }
            100% { transform: scale(1); }
        }

        /* Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(254,222,62,0.18);
            transform: scale(0);
            animation: rippleOut 0.55s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleOut {
            to { transform: scale(4); opacity: 0; }
        }

        .opt-indicator {
            width: 20px; height: 20px;
            border: 1.5px solid rgba(255,255,255,0.2);
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            transition: all 0.18s;
        }
        .option-card.radio   .opt-indicator { border-radius: 50%; }
        .option-card.checkbox .opt-indicator { border-radius: 5px; }
        .option-card.selected .opt-indicator {
            background: var(--accent); border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .opt-indicator svg {
            width: 10px; height: 10px;
            opacity: 0; transform: scale(0.4);
            transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
        }
        .option-card.selected .opt-indicator svg { opacity: 1; transform: scale(1); }
        .opt-label { font-size: 14px; font-weight: 600; flex: 1; transition: color 0.18s; }

        /* Keyboard hint badge on card */
        .opt-key {
            font-size: 10px; font-weight: 700; color: var(--text-faint);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px; padding: 2px 6px;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            transition: color 0.18s, border-color 0.18s;
        }
        .option-card.selected .opt-key { color: var(--accent); border-color: rgba(254,222,62,0.2); }

        /* ── Scale cards ── */
        .scale-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .scale-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 10px;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 8px; text-align: center;
            transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s;
            -webkit-user-select: none; user-select: none;
            position: relative; overflow: hidden;
        }
        .scale-card:hover {
            background: var(--card-hover);
            border-color: rgba(254,222,62,0.2);
            transform: translateY(-2px);
        }
        .scale-card.selected {
            background: var(--card-selected); border-color: var(--border-selected);
            box-shadow: 0 0 0 1px rgba(254,222,62,0.12), 0 4px 20px rgba(254,222,62,0.08);
            animation: cardPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .scale-num {
            font-size: 22px; font-weight: 900;
            color: var(--text-faint); transition: color 0.18s;
        }
        .scale-card.selected .scale-num { color: var(--accent); }
        .scale-lbl {
            font-size: 10.5px; font-weight: 700;
            color: var(--text-dim); line-height: 1.3; letter-spacing: 0.01em;
        }

        /* ── Name input (hero style) ── */
        .name-wrap {
            display: flex; flex-direction: column; gap: 0;
        }
        .name-input {
            background: transparent;
            border: none; border-bottom: 2px solid rgba(255,255,255,0.15);
            padding: 12px 0;
            color: var(--text);
            font-family: 'Red Hat Display', sans-serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 700;
            width: 100%; outline: none;
            transition: border-color 0.2s;
            letter-spacing: -0.02em;
            caret-color: var(--accent);
        }
        .name-input::placeholder { color: var(--text-faint); font-weight: 500; }
        .name-input:focus { border-bottom-color: var(--accent); }
        .name-hint {
            margin-top: 10px;
            font-size: 12px; font-weight: 600; color: var(--text-faint);
            letter-spacing: 0.04em;
        }

        /* ── Textarea ── */
        .text-input {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 22px;
            color: var(--text); font-family: 'Red Hat Display', sans-serif;
            font-size: 14px; font-weight: 400; resize: none;
            width: 100%; min-height: 130px; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            line-height: 1.65;
        }
        .text-input::placeholder { color: var(--text-faint); }
        .text-input:focus {
            border-color: rgba(254,222,62,0.4);
            box-shadow: 0 0 0 3px rgba(254,222,62,0.05);
            background: rgba(255,255,255,0.05);
        }

        /* ── Inspiration button ── */
        .inspo-btn {
            align-self: flex-start;
            background: rgba(254,222,62,0.08);
            border: 1px solid rgba(254,222,62,0.22);
            border-radius: 100px;
            color: var(--accent);
            font-family: 'Red Hat Display', sans-serif;
            font-size: 12px; font-weight: 700;
            cursor: pointer;
            padding: 8px 16px;
            display: flex; align-items: center; gap: 7px;
            transition: background 0.18s, border-color 0.18s, transform 0.18s;
            letter-spacing: 0.02em;
        }
        .inspo-btn:hover {
            background: rgba(254,222,62,0.14);
            border-color: rgba(254,222,62,0.4);
            transform: translateY(-1px);
        }
        .inspo-btn:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none;
        }
        .inspo-btn .spinner {
            width: 12px; height: 12px;
            border: 2px solid rgba(254,222,62,0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Suggestion chips ── */
        .inspo-chips {
            display: flex; flex-direction: column; gap: 8px;
            margin-top: 4px;
        }
        .inspo-chip {
            background: rgba(254,222,62,0.05);
            border: 1px solid rgba(254,222,62,0.18);
            border-radius: 10px;
            padding: 12px 16px;
            cursor: pointer;
            display: flex; align-items: flex-start; gap: 12px;
            font-size: 13px; font-weight: 500; color: var(--text-dim);
            line-height: 1.5;
            transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s;
            text-align: left;
            animation: fadeUp 0.35s ease both;
        }
        .inspo-chip:nth-child(1) { animation-delay: 0.04s; }
        .inspo-chip:nth-child(2) { animation-delay: 0.10s; }
        .inspo-chip:nth-child(3) { animation-delay: 0.16s; }
        .inspo-chip:hover {
            background: rgba(254,222,62,0.1);
            border-color: rgba(254,222,62,0.35);
            color: var(--text);
            transform: translateY(-1px);
        }
        .inspo-chip .chip-icon {
            flex-shrink: 0; margin-top: 1px;
            font-size: 14px; line-height: 1;
        }
        .inspo-chip .chip-text { flex: 1; }

        /* ── Nav ── */
        .q-nav { display: flex; align-items: center; justify-content: space-between; }
        .btn-back {
            background: none; border: none; color: var(--text-dim);
            font-family: 'Red Hat Display', sans-serif;
            font-size: 12px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            padding: 8px 0; transition: color 0.2s; letter-spacing: 0.03em;
        }
        .btn-back:hover { color: var(--text); }
        .btn-back.invisible { visibility: hidden; }

        .btn-next {
            background: var(--accent); border: none; color: #000;
            font-family: 'Red Hat Display', sans-serif;
            font-size: 14px; font-weight: 800;
            cursor: pointer; padding: 13px 30px; border-radius: 100px;
            display: flex; align-items: center; gap: 8px;
            letter-spacing: -0.01em; position: relative; overflow: hidden;
            transition: transform 0.18s, box-shadow 0.18s;
        }
        .btn-next::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(0,0,0,0.08); opacity: 0; transition: opacity 0.18s;
        }
        .btn-next:hover::before { opacity: 1; }
        .btn-next:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(254,222,62,0.35); }
        .btn-next:active { transform: translateY(0); }
        .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-next svg path { stroke: #000; }

        .hint-text {
            font-size: 11px; font-weight: 600;
            color: var(--text-faint); letter-spacing: 0.05em;
        }

        /* ── Keyboard shortcut hint ── */
        .kbd-hint {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 100px; padding: 8px 18px;
            font-size: 11px; font-weight: 600; color: var(--text-faint);
            letter-spacing: 0.04em;
            z-index: 10; pointer-events: none;
            opacity: 1; transition: opacity 0.5s;
        }
        .kbd-hint.hidden { opacity: 0; }
        .kbd-hint kbd {
            background: rgba(254,222,62,0.1);
            border: 1px solid rgba(254,222,62,0.2);
            border-radius: 4px; padding: 1px 6px;
            color: var(--accent); font-family: 'Red Hat Display', sans-serif;
            font-size: 10px; font-weight: 800;
        }

        /* ── Completion ── */
        .completion {
            position: absolute; width: 100%; max-width: 680px;
            display: flex; flex-direction: column; align-items: center;
            gap: 28px; text-align: center; padding: 0 16px;
            animation: fadeUp 0.6s ease both;
        }
        .check-ring {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            animation: pulse-ring 2.5s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%,100% { box-shadow: 0 0 0 0 rgba(254,222,62,0.4); }
            50%      { box-shadow: 0 0 0 18px rgba(254,222,62,0); }
        }
        .done-title { font-size: clamp(28px, 4vw, 38px); font-weight: 900; letter-spacing: -0.03em; }
        .done-sub {
            font-size: 14px; color: var(--text-dim); max-width: 380px;
            line-height: 1.65; font-weight: 400; margin-top: -12px;
        }
        .summary-grid { width: 100%; display: grid; gap: 9px; text-align: left; }
        .summary-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 18px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .sum-label {
            font-size: 10px; font-weight: 800; color: var(--accent);
            letter-spacing: 0.12em; text-transform: uppercase;
        }
        .sum-value { font-size: 13.5px; font-weight: 500; color: var(--text); line-height: 1.45; }

        /* ── AI Workshop Brief ── */
        .brief-card {
            width: 100%;
            background: rgba(254,222,62,0.06);
            border: 1px solid rgba(254,222,62,0.22);
            border-radius: 14px;
            padding: 20px 22px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeUp 0.5s ease both 0.2s;
        }
        .brief-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 10px; font-weight: 800;
            color: var(--accent); letter-spacing: 0.13em; text-transform: uppercase;
        }
        .brief-label .pulse-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 1.4s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.7); }
        }
        .brief-text {
            font-size: 14px; font-weight: 500;
            color: var(--text); line-height: 1.7;
        }
        .brief-loading {
            display: flex; align-items: center; gap: 10px;
            font-size: 13px; font-weight: 600; color: var(--text-dim);
        }
        .brief-loading .spinner {
            width: 14px; height: 14px; flex-shrink: 0;
            border: 2px solid rgba(254,222,62,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ── Confetti canvas ── */
        #confetti-canvas {
            position: fixed; inset: 0; z-index: 100;
            pointer-events: none; width: 100%; height: 100%;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            /* Use dynamic viewport height to avoid mobile browser chrome overlap */
            .app { height: 100dvh; }

            .top-bar { padding: 14px 20px; }
            .progress-wrap { padding: 0 20px 4px; }

            /* Allow vertical scroll within content area while clipping horizontal (for transitions) */
            .content-area {
                padding: 16px 20px 80px;
                overflow-x: hidden;
                overflow-y: auto;
                align-items: flex-start;
                -webkit-overflow-scrolling: touch;
            }

            /* Question panel: relative flow on mobile so it doesn't clip */
            .question-panel {
                position: relative;
                max-width: 100%;
            }
            /* Re-anchor absolute transitions to still work */
            .question-panel.exit-left,
            .question-panel.exit-right,
            .question-panel.enter-right,
            .question-panel.enter-left {
                position: absolute;
                top: 0; left: 20px; right: 20px; width: auto;
            }

            .options-grid.two-col { grid-template-columns: 1fr; }

            /* 5-column scale fits better than 3+2 split */
            .scale-grid { grid-template-columns: repeat(5, 1fr); gap: 5px; }
            .scale-card { padding: 12px 4px; }
            .scale-num { font-size: 18px; }
            .scale-lbl { font-size: 9px; }

            /* Completion screen: relative flow so it scrolls */
            .completion { position: relative; padding: 16px 0 40px; }

            /* Touch feedback */
            .option-card:active { transform: scale(0.98); background: var(--card-hover); }

/* Replaces {name} with first name, falling back to 'you' */
function personalize(text) {
    if (!text) return text;
    const firstName = (answers.name || '').trim().split(/\s+/)[0] || 'you';

let cur = 0;
let kbdHintHidden = false;
const answers = {};
const stage   = document.getElementById('stage');

const counter = document.getElementById('counter');
const dotWrap = document.getElementById('dot-steps');

/* ── Dot-step progress ── */
function buildDots() {
    dotWrap.innerHTML = '';
    questions.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot-step';
        d.dataset.idx = i;
        d.onclick = () => { if (i <= cur) go(i, i < cur ? 'back' : 'fwd'); };

function updateDots(idx) {
    dotWrap.querySelectorAll('.dot-step').forEach((d, i) => {
        d.classList.toggle('done',   i < idx);
        d.classList.toggle('active', i === idx);

}

/* ── Render ── */
function buildPanel(i) {
    const q = questions[i];
    const panel = document.createElement('div');
    panel.className = 'question-panel';
    panel.id = 'qp-' + i;

    let bodyHTML = '';

    if (q.type === 'name') {
        bodyHTML = `<div class="q-body name-wrap">
            <input type="text" class="name-input" id="name-input"

                value="${escHtml(answers[q.id] || '')}"
                oninput="answers['${q.id}']=this.value"
                onkeydown="if(event.key==='Enter'&&this.value.trim())goNext();"
                autocomplete="given-name" spellcheck="false">
            <div class="name-hint">Press Enter or tap Continue ↵</div>
        </div>`;
    } else if (q.type === 'radio' || q.type === 'checkbox') {
        const twoCol = q.options.length >= 6;
        const icon = q.type === 'radio'
            ? '<circle cx="5" cy="5" r="2.8" fill="#000"/>'
            : '<polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
        bodyHTML = `<div class="options-grid q-body${twoCol ? ' two-col' : ''}">
            ${q.options.map((opt, oi) => {
                const sel = Array.isArray(answers[q.id])
                    ? answers[q.id].includes(opt)
                    : answers[q.id] === opt;
                return `<div class="option-card ${q.type}${sel ? ' selected' : ''}"
                             data-val="${escHtml(opt)}"
                             onclick="pick(event,${i},'${escJs(opt)}','${q.type}')">
                    <div class="opt-indicator">
                        <svg viewBox="0 0 10 10" fill="none">${icon}</svg>
                    </div>
                    <span class="opt-label">${escHtml(opt)}</span>
                    <span class="opt-key">${oi + 1}</span>
                </div>`;
            }).join('')}
        </div>`;
    } else if (q.type === 'scale') {
        bodyHTML = `<div class="scale-grid q-body">
            ${q.options.map((opt, idx) => {
                const sel = answers[q.id] === opt;
                return `<div class="scale-card${sel ? ' selected' : ''}" onclick="pickScale(event,${i},'${escJs(opt)}')">

            ${showInspo ? `
            <button class="inspo-btn" id="inspo-btn" onclick="getInspiration()">

/* ── Ripple helper ── */
function spawnRipple(e, el) {
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = (e.clientX || rect.left + rect.width / 2) - rect.left - size / 2;
    const y = (e.clientY || rect.top  + rect.height / 2) - rect.top  - size / 2;
    const rip = document.createElement('span');
    rip.className = 'ripple';
    rip.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
    el.appendChild(rip);
    rip.addEventListener('animationend', () => rip.remove());
}

/* ── Transition ── */
function go(newIdx, dir) {
    const old = stage.querySelector('.question-panel.active');
    if (old) {
        old.classList.remove('active');
        old.classList.add(dir === 'fwd' ? 'exit-left' : 'exit-right');
        setTimeout(() => old.remove(), 520);
    }
    cur = newIdx;
    curNum.textContent = String(cur + 1).padStart(2, '0');
    updateDots(cur);

    const panel = buildPanel(newIdx);
    stage.appendChild(panel);
    panel.getBoundingClientRect();
    panel.classList.add(dir === 'fwd' ? 'enter-right' : 'enter-left');
    requestAnimationFrame(() => requestAnimationFrame(() => {
        panel.classList.remove('enter-right', 'enter-left');
        panel.classList.add('active');
        // Auto-focus name input after transition
        const ni = panel.querySelector('.name-input');
        if (ni) setTimeout(() => ni.focus(), 320);
    }));
}

        kbdHintHidden = true;

}

function pick(e, qIdx, val, type) {
    spawnRipple(e, e.currentTarget);
    hideKbdHint();
    const q = questions[qIdx];
    if (type === 'radio') {
        answers[q.id] = val;

    } else {
        if (!answers[q.id]) answers[q.id] = [];
        const arr = answers[q.id];
        const pos = arr.indexOf(val);
        pos === -1 ? arr.push(val) : arr.splice(pos, 1);
        document.querySelectorAll(`#qp-${qIdx} .option-card.checkbox`).forEach(c => {
            c.classList.toggle('selected', arr.includes(c.dataset.val));
        });

}

    spawnRipple(e, e.currentTarget);
    hideKbdHint();

const CLAUDE_KEY = '__CLAUDE_KEY__';

async function getInspiration() {

    if (!btn || !chips) return;

    // Loading state
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Thinking…';
    chips.innerHTML = '';

    const team      = answers.team      || 'a team';
    const interests = Array.isArray(answers.interests) ? answers.interests.join(', ') : (answers.interests || '');
    const demo      = Array.isArray(answers.demo)      ? answers.demo.join(', ')      : (answers.demo      || '');

    const prompt = `You are helping ${answers.name || 'someone'}, who works on the ${team} at RevoU (an Indonesian online tech education company), fill in a pre-workshop survey for an internal Claude Code AI workshop.

Their context:
- Team: ${team}
- Learning interests: ${interests || 'not specified'}
- Demo preferences: ${demo || 'not specified'}

Suggest exactly 3 specific, practical work challenges they could tackle with Claude Code / AI automation — tailored to their actual team and interests. Be concrete: name the real task, not a generic category. Keep each suggestion to 1 short sentence.

Respond with ONLY a valid JSON array of 3 strings. No markdown, no explanation.`;

    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'x-api-key': CLAUDE_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',

                messages: [{ role: 'user', content: prompt }]
            })
        });

        if (!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();
        const raw  = data.content?.[0]?.text?.trim() || '[]';

        let suggestions;
        try { suggestions = JSON.parse(raw); }
        catch { suggestions = []; }

        if (!Array.isArray(suggestions) || suggestions.length === 0) throw new Error('empty');

        // Render chips
        chips.innerHTML = suggestions.map(s => `

    btn.innerHTML = '<span>✦</span> Try again';
}

function applyInspo(chipEl) {
    const text = chipEl.querySelector('.chip-text').textContent;

    chipEl.style.color = 'var(--text)';
}

function goNext() {
    const q = questions[cur];

    if (q && q.type === 'name' && !answers.name?.trim()) {
        const ni = document.getElementById('name-input');
        if (ni) { ni.focus(); ni.style.borderBottomColor = 'var(--accent)'; }
        return;
    }
    if (cur < questions.length - 1) {
        go(cur + 1, 'fwd');
    } else {
        showDone();
    }
}

function goBack() {
    if (cur > 0) go(cur - 1, 'back');
}

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA') return;
    if (e.target.classList.contains('name-input')) return;

    const q = questions[cur];
    if (!q) return;

    // Number keys for selecting options
    const num = parseInt(e.key);
    if (!isNaN(num) && num >= 1) {
        hideKbdHint();
        if (q.type === 'radio' || q.type === 'checkbox') {
            const cards = document.querySelectorAll(`#qp-${cur} .option-card`);
            if (cards[num - 1]) cards[num - 1].click();
        } else if (q.type === 'scale') {
            const cards = document.querySelectorAll(`#qp-${cur} .scale-card`);
            if (cards[num - 1]) cards[num - 1].click();
        }
        return;
    }

    if (e.key === 'Enter') { e.preventDefault(); goNext(); }
    if (e.key === 'Backspace') { e.preventDefault(); goBack(); }
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goBack();
});

/* ── Completion ── */
function showDone() {

    const demo        = Array.isArray(answers.demo)      ? answers.demo.join(', ')      : (answers.demo      || '');
    const familiarity = answers.familiarity || 'some experience';
    const usecase     = answers.usecase     || '';

    const prompt = `You are writing a short, warm, personalized "workshop brief" for ${answers.name || 'a participant'} who just filled out a pre-workshop survey for an internal Claude Code AI workshop at RevoU (Indonesian online tech education company).

Their answers:
- Team: ${team}
- Learning interests: ${interests}
- Demo preferences: ${demo || 'not specified'}
- Familiarity with Claude Code: ${familiarity}
- Specific challenge: ${usecase || 'not specified'}

Write exactly 2–3 sentences that:
1. Acknowledge what they're most interested in (be specific, mention it directly)
2. Tell them what part of the workshop will be most relevant for them
3. Optionally reference their specific challenge if they shared one

Tone: warm, direct, like a knowledgeable friend — not corporate. No fluff. Start with their interest, not their name.`;

    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'x-api-key': CLAUDE_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
                'anthropic-dangerous-direct-browser-access': 'true'

/* ── Lightweight confetti ── */
function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#fede3e','#ffe566','#ffffff','#000000','#fcb031','#fef5bc'];
    const particles = [];
    const count = 120;

    for (let i = 0; i < count; i++) {
        particles.push({
            x: canvas.width / 2 + (Math.random() - 0.5) * 200,
            y: canvas.height * 0.45,
            vx: (Math.random() - 0.5) * 14,
            vy: -(Math.random() * 10 + 6),
            w: Math.random() * 10 + 4,
            h: Math.random() * 5 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 0.25,
            gravity: 0.28,
            decay: 0.992,
            alpha: 1
        });
    }

    let frame;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (const p of particles) {
            if (p.alpha < 0.01) continue;
            alive = true;
            p.vy  += p.gravity;
            p.vx  *= p.decay;
            p.x   += p.vx;
            p.y   += p.vy;
            p.rot += p.rotV;
            p.alpha *= 0.985;

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
        }
        if (alive) frame = requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
    setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 4000);
}

/* ── Helpers ── */
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

/* ── Init ── */
buildDots();
updateDots(0);
const first = buildPanel(0);
first.classList.add('active');
stage.appendChild(first);

// Auto-hide kbd hint after 8s
setTimeout(() => { if (!kbdHintHidden) kbdHint.classList.add('hidden'); }, 8000);
</script>
